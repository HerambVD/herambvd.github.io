name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
      - upgrades-apr-2026
  pull_request:
    branches:
      - master
      - upgrades-apr-2026

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /herambvd.github.io

      - name: Export static site
        run: npm run export
        env:
          NEXT_PUBLIC_BASE_PATH: /herambvd.github.io

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Submit sitemap to Google
        run: |
          curl "https://www.google.com/ping?sitemap=https://herambvd.github.io/herambvd.github.io/sitemap.xml"

      - name: Submit sitemap to Bing
        run: |
          curl "http://www.bing.com/ping?sitemap=https://herambvd.github.io/herambvd.github.io/sitemap.xml"
